<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pembayaran Berhasil | OspekUB.kit</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #042125;
            --accent: #D4AF37;
            --secondary: #1a6b7a;
            --bg-dark: #021618;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, var(--bg-dark) 0%, var(--primary) 60%, #0a3a40 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }
        .success-card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 24px;
            padding: 60px 50px;
            text-align: center;
            max-width: 540px;
            width: 90%;
            animation: fadeInUp 0.6s ease-out;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .success-icon {
            width: 90px;
            height: 90px;
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            color: white;
            margin: 0 auto 28px;
            box-shadow: 0 0 40px rgba(46, 204, 113, 0.4);
        }
        h1 {
            font-family: 'Montserrat', sans-serif;
            font-size: 2rem;
            font-weight: 800;
            color: #2ecc71;
            margin-bottom: 12px;
        }
        .tagline {
            font-size: 1rem;
            opacity: 0.8;
            line-height: 1.6;
            margin-bottom: 36px;
        }
        .order-box {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 12px;
            padding: 20px 24px;
            text-align: left;
            margin-bottom: 28px;
        }
        .order-box-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            font-size: 0.9rem;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }
        .order-box-row:last-child { border-bottom: none; }
        .order-box-row span:first-child { opacity: 0.7; }
        .order-box-row span:last-child { font-weight: 600; color: var(--accent); }
        .btn-home {
            display: inline-block;
            background: linear-gradient(135deg, var(--accent), #b8922a);
            color: var(--primary);
            font-family: 'Montserrat', sans-serif;
            font-weight: 700;
            padding: 14px 32px;
            border-radius: 50px;
            text-decoration: none;
            font-size: 1rem;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 20px rgba(212, 175, 55, 0.3);
        }
        .btn-home:hover { transform: translateY(-3px); box-shadow: 0 8px 30px rgba(212, 175, 55, 0.5); }
        .footer-note {
            margin-top: 24px;
            font-size: 0.8rem;
            opacity: 0.5;
        }
        #spinner-loading {
            display: none;
            margin-top: 12px;
            font-size: 0.85rem;
            opacity: 0.7;
        }
    </style>
</head>
<body>
    <div class="success-card">
        <div class="success-icon">
            <i class="fa-solid fa-circle-check"></i>
        </div>
        <h1>Pembayaran Berhasil! 🎉</h1>
        <p class="tagline">
            Selamat, kamu sudah ngamanin perlengkapan OSPEK-mu!<br>
            <strong>Invoice lunas</strong> akan dikirimkan ke email kamu setelah pembayaran terverifikasi.
        </p>

        <div class="order-box">
            <div class="order-box-row">
                <span>Order ID</span>
                <span id="ps-order-id">#UB-...</span>
            </div>
            <div class="order-box-row">
                <span>Status Pembayaran</span>
                <span style="color: #2ecc71;"><i class="fa-solid fa-circle-check"></i> LUNAS</span>
            </div>
            <div class="order-box-row">
                <span>Konfirmasi ke</span>
                <span>Email Kamu</span>
            </div>
        </div>

        <a href="index.html" class="btn-home">
            <i class="fa-solid fa-house"></i> Kembali ke Beranda
        </a>
        <p class="footer-note">© 2026 OspekUB.kit — Ksatria Muda Universitas Brawijaya</p>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const orderId = params.get('order');
        if (orderId) {
            document.getElementById('ps-order-id').textContent = '#' + orderId;
        }
    </script>
</body>
</html>
